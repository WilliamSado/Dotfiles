# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(cceeffbb)
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 20
    shadow {
        enabled = true
        color = rgba(0000005f)
        color_inactive = rgba(0000003f)
        range = 25
    }
    blur {
        enabled = true
        size = 2
        passes = 2
        contrast = 1.2
    }
}

cursor {
    no_hardware_cursors = true
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windowsMove, 1, 7, myBezier
    animation = windowsIn, 1, 3, default, popin 90%
    animation = windowsOut, 1, 2, default, popin 95%
    animation = border, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 5, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    # pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
    split_width_multiplier = 1.4
}

misc {
    #force_hypr_chan = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    render_unfocused_fps = 60
}
