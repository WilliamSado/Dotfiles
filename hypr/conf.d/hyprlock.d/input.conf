# Password input
input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgb(598da8) rgb(598da8) 45deg
    check_color = rgb(598da8) rgb(598da8) 120deg
    fail_color = rgb(598da8) rgb(598da8) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL$FPRINTFAIL
    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}
